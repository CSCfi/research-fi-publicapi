apiVersion: template.openshift.io/v1
kind: Template
metadata:
  labels:
    app: publicapi-indexer-devel
    template: publicapi-indexer-manualjob-devel
  name: publicapi-indexer-manualjob-devel
  annotations:
    description: "Public API indexer devel - single-run Job"
    iconClass: icon-dotnet
objects:
  # Single-run Job (devel)
  # Use this job to index entities to ElasticSearch manually when needed.
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: publicapi-indexer-manualjob-devel
      labels:
        app: publicapi-indexer-devel
      annotations:
        description: Public API indexer devel - single-run Job
    spec:
      activeDeadlineSeconds: 5400 # Can run for 90 minutes
      completions: 1 # Ensure only one successful completion is needed
      backoffLimit: 1 # Allow only one retry on failure
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: publicapi-indexer-manualjob-container-devel
              image: publicapi-indexer-devel
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: publicapi-api-secret-devel
                - configMapRef:
                    name: publicapi-api-config-devel
              resources:
                limits:
                  cpu: 500m
                  memory: 2Gi
                requests:
                  cpu: 100m
                  memory: 512Mi
